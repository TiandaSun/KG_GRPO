# Stage 4: SFT Warmup Configuration
# Teaches <think> CoT format before GRPO training.
# See MINIMAL_VALIDATION_PLAN.md Stage 4 for rationale.

model:
  name: "Qwen/Qwen2.5-1.5B-Instruct"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

lora:
  r: 16
  lora_alpha: 32
  target_modules: "all-linear"
  lora_dropout: 0.05
  use_dora: true
  use_rslora: true

sft:
  num_train_epochs: 2
  per_device_train_batch_size: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  gradient_checkpointing: true
  max_seq_length: 512
  logging_steps: 10
  save_strategy: "epoch"
  optim: "adamw_8bit"
  bf16: true
  seed: 42
  report_to: "wandb"
  run_name: "kg-align-sft-warmup"

data:
  train_file: "data/processed/conceptnet_qa_train.jsonl"
  val_file: "data/processed/conceptnet_qa_val.jsonl"

output:
  dir: "outputs/sft-warmup"
