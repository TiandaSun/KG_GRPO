# GRPO training config: 7B model, ConceptNet, verl
# For experiments E4-E6 (vary reward_type in kg_tool_config.yaml)

hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_trainer
  - _self_

data:
  train_files:
    - "data/processed/verl_conceptnet/train.parquet"
  val_files:
    - "data/processed/verl_conceptnet/val.parquet"
  max_prompt_length: 1024
  max_response_length: 2048
  train_batch_size: 64
  return_raw_chat: true
  shuffle: false  # preserve curriculum ordering

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: false

actor_rollout_ref:
  model:
    path: "Qwen/Qwen2.5-7B-Instruct"
    enable_gradient_checkpointing: true
    override_config:
      attn_implementation: "sdpa"
  actor:
    optim:
      lr: 5.0e-6
    use_kl_loss: false
    ppo_mini_batch_size: 16
    ppo_micro_batch_size_per_gpu: 2
  ref:
    log_prob_micro_batch_size_per_gpu: 4
  rollout:
    name: vllm
    mode: "async"  # CRITICAL: enables AgentLoopManager for multi-turn tool calls
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.5
    enforce_eager: true  # disable CUDA graphs — fixes vLLM v1 crash in colocate mode
    log_prob_micro_batch_size_per_gpu: 4
    n: 8
    temperature: 0.7
    top_p: 1.0
    multi_turn:
      enable: true
      max_assistant_turns: 8
      max_tool_response_length: 512
      tool_config_path: "configs_verl/kg_tool_config.yaml"
      format: "kg_search"  # Custom parser for <search>action(args)</search> format

custom_reward_function:
  path: "src_verl/rewards/verl_reward.py"
  name: "compute_score"

trainer:
  n_gpus_per_node: 2
  total_epochs: 3
  save_freq: 50
  test_freq: 50
  project_name: "kg-align-verl"
  experiment_name: "grpo-conceptnet-7b"
  logger:
    - wandb
