# SFT warmup for multi-turn KG agent trajectories
model:
  model_name: "Qwen/Qwen2.5-1.5B-Instruct"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

lora:
  lora_r: 16
  lora_alpha: 32
  lora_target_modules: "all-linear"
  lora_dropout: 0.05
  use_dora: true
  use_rslora: true

training:
  num_train_epochs: 2
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  gradient_checkpointing: true
  max_seq_length: 2048
  logging_steps: 10
  save_strategy: "epoch"
  warmup_ratio: 0.05
  optim: "adamw_8bit"

data:
  train_file: "data/processed/sft_trajectories.jsonl"
  output_dir: "outputs/verl-sft"

wandb:
  wandb_project: "kg-align-verl"
  wandb_run_name: "sft-multiturn-1.5b"
