# v15 W6 — Llama-3.1-8B-Instruct SFT on the 5K rule-based format-scaffolding corpus
# Mirrors configs_verl/sft_cwq.yaml but with Llama base. Same hyperparameters as
# the canonical 7B Qwen rule-based SFT (LoRA r=64, 2 epochs).
model:
  model_name: "meta-llama/Llama-3.1-8B-Instruct"
  torch_dtype: "bfloat16"
  attn_implementation: "eager"  # flash_attn unavailable on ARM GH200

lora:
  lora_r: 64
  lora_alpha: 128
  lora_target_modules: "all-linear"
  lora_dropout: 0.05
  use_dora: true
  use_rslora: true

training:
  num_train_epochs: 2
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  gradient_checkpointing: true
  max_seq_length: 2048
  logging_steps: 10
  save_strategy: "epoch"
  warmup_ratio: 0.05
  optim: "adamw_torch"

data:
  train_file: "data/freebase/sft_trajectories.jsonl"
  output_dir: "outputs/verl-sft-cwq-llama8b-w6"

wandb:
  wandb_project: "kg-align-verl"
  wandb_run_name: "sft-cwq-llama8b-w6-20260505"
