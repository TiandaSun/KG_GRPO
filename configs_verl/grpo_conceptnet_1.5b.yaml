# GRPO training config: 1.5B model, ConceptNet, verl
# For experiments E1-E3 (vary reward_type in kg_tool_config.yaml)
#
# Launch:
#   python3 -m verl.trainer.main_ppo \
#       --config-path=configs_verl \
#       --config-name=grpo_conceptnet_1.5b

hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_trainer
  - _self_

data:
  train_files:
    - "data/processed/verl_conceptnet/train.parquet"
  val_files:
    - "data/processed/verl_conceptnet/val.parquet"
  max_prompt_length: 1024
  max_response_length: 2048
  train_batch_size: 64
  return_raw_chat: true
  shuffle: false  # preserve curriculum ordering

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: false

actor_rollout_ref:
  model:
    path: "outputs/verl-sft-merged"  # SFT-warmed model (merged LoRA adapter)
    enable_gradient_checkpointing: true
    override_config:
      attn_implementation: "sdpa"
  actor:
    optim:
      lr: 1.0e-5
    use_kl_loss: false
    ppo_mini_batch_size: 16
    ppo_micro_batch_size_per_gpu: 4
  ref:
    log_prob_micro_batch_size_per_gpu: 8
  rollout:
    name: vllm
    mode: "async"  # CRITICAL: enables AgentLoopManager for multi-turn tool calls
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.5
    log_prob_micro_batch_size_per_gpu: 8
    enforce_eager: true  # disable CUDA graphs — fixes vLLM v1 crash in colocate mode
    n: 8  # num_generations per prompt
    temperature: 0.7
    top_p: 1.0
    multi_turn:
      enable: true
      max_assistant_turns: 8
      max_tool_response_length: 512
      tool_config_path: "configs_verl/kg_tool_config.yaml"
      format: "kg_search"  # Custom parser for <search>action(args)</search> format

custom_reward_function:
  path: "src_verl/rewards/verl_reward.py"
  name: "compute_score"

trainer:
  n_gpus_per_node: 1
  total_epochs: 3
  save_freq: 50
  test_freq: 50  # validate every 50 steps (was -1 default = disabled)
  project_name: "kg-align-verl"
  experiment_name: "grpo-conceptnet-1.5b"
  logger:
    - wandb
